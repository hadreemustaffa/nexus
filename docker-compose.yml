services:
  frontend:
    image: nexus/client
    build:
      context: .
      dockerfile: ./client/Dockerfile
    ports:
      - '5173:5173'
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./client/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
  backend:
    image: nexus/server
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      CLIENT_URL: http://localhost:5173
      DATABASE_PATH: /app/nexus.db
      OLLAMA_URL: http://host.docker.internal:11434
    volumes:
      - ./server/nexus.db:/app/nexus.db
